<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game Tính Nhẩm - Mental Math</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="background-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>

    <div class="container">
        <!-- Landing Screen -->
        <div id="landing-screen" class="screen active">
            <h1 class="glitch-text">Mental Math</h1>
            <p class="subtitle">Thử thách trí tuệ với các phép tính nhanh</p>
            <button id="start-btn" class="glass-btn pulse">Bắt đầu ngay</button>
        </div>

        <!-- Game Screen -->
        <div id="game-screen" class="screen">
            <div class="stats">
                <div class="stat-item">
                    <span class="label">Đúng:</span>
                    <span id="score-count" class="value">0</span>
                </div>
                <div class="stat-item">
                    <span class="label">Tổng:</span>
                    <span id="total-count" class="value">0</span>
                </div>
            </div>

            <div class="game-card glass-card">
                <div id="question-area">
                    <div id="equation" class="equation">123 + 456</div>
                </div>
                
                <div class="input-wrapper">
                    <input type="number" id="answer-input" autocomplete="off">
                    <div class="divider"></div>
                </div>

                <div id="feedback-area" class="feedback-area">
                    <p id="feedback-msg"></p>
                    <p id="correct-answer-display" class="correct-answer"></p>
                </div>

                <button id="next-btn" class="glass-btn secondary hidden">Tiếp</button>
            </div>

            <button id="exit-btn" class="text-btn">Dừng chơi</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
